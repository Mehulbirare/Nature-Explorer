# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true

android.useAndroidX=true

# React Native
newArchEnabled=true
hermesEnabled=true

# Only build the ABIs we need: arm64 (real devices) + x86_64 (modern emulators).
# Add armeabi-v7a / x86 here if you target older 32-bit devices.
reactNativeArchitectures=arm64-v8a,x86_64
